# Railway Configuration for Stellar Dominion
# Documentation: https://docs.railway.app/deploy/config-as-code

[build]
builder = "NIXPACKS"
buildCommand = "npm ci && npm run build"
watchPatterns = ["src/**"]

[deploy]
numReplicas = 1
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
startCommand = "npm start"
healthcheckPath = "/api/status"
healthcheckTimeout = 300
region = "us-west"

# Health Check Configuration
[healthcheck]
path = "/api/status"
interval = 30
timeout = 10

# Environment Variables (Production)
[deploy.env]
NODE_ENV = "production"
PORT = "5000"

# Service Configuration
[[services]]
name = "stellar-dominion-web"
type = "web"

  [services.build]
  buildCommand = "npm ci && npm run build"
  builder = "NIXPACKS"
  
  [services.deploy]
  startCommand = "npm start"
  restartPolicyType = "ON_FAILURE"
  restartPolicyMaxRetries = 10
  
  [services.healthcheck]
  path = "/api/status"
  interval = 30
  timeout = 10

# PostgreSQL Database Plugin
[[plugins]]
type = "postgresql"
name = "stellar-dominion-db"

# Cron Jobs (optional - for scheduled tasks)
# [[crons]]
# schedule = "0 2 * * *"
# command = "npm run db:backup"

# Static Files (if needed)
# [staticFiles]
# "/public" = "client/public"
